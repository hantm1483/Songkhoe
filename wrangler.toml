name = "so-tay-tieu-duong-auth"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"
SUPABASE_JWT_SECRET = "your-supabase-jwt-secret"

[observability]
enabled = true

[[observability.bindings]]
name = "logs"
type = "trace"

[[kv_namespaces]]
binding = "SECRETS_KV"
id = "your-kv-namespace-id"